<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清掃管理カレンダー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a73e8;--blue-light:#e8f0fe;--blue-dark:#1557b0;
  --green:#0f9d58;--green-light:#e6f4ea;
  --amber:#f4511e;--amber-light:#fce8e6;
  --purple:#8430ce;--purple-light:#f3e8fd;
  --gray-50:#f8f9fa;--gray-100:#f1f3f4;--gray-200:#e8eaed;
  --gray-400:#9aa0a6;--gray-600:#5f6368;--gray-800:#3c4043;--gray-900:#202124;
  --border:1px solid #e8eaed;--radius:8px;--radius-lg:12px;
}
body{font-family:'Noto Sans JP',sans-serif;background:#f1f3f4;color:var(--gray-900);font-size:14px;min-height:100vh}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:#fff;border-right:var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sidebar-logo{padding:16px 20px;border-bottom:var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.logo-text{font-size:14px;font-weight:600;color:var(--gray-900)}
.logo-sub{font-size:11px;color:var(--gray-400)}
.sidebar-section{padding:12px 16px;border-bottom:var(--border)}
.sidebar-label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.property-item{display:flex;align-items:center;gap:8px;padding:5px 4px;border-radius:6px;cursor:pointer;transition:background .15s}
.property-item:hover{background:var(--gray-50)}
.prop-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prop-name{font-size:13px;color:var(--gray-800);flex:1}
.prop-toggle{width:16px;height:16px;border-radius:3px;border:1.5px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.staff-item{display:flex;align-items:center;gap:8px;padding:4px}
.staff-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.staff-name{font-size:12px;color:var(--gray-600)}
.sync-section{padding:12px 16px;margin-top:auto;border-top:var(--border)}
.sync-title{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.sync-status{font-size:12px;color:var(--gray-600);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.sync-btn{width:100%;padding:7px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.sync-btn:hover{background:var(--blue-dark)}
.sync-btn:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed}
.header{padding:10px 20px;background:#fff;border-bottom:var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-btn{width:30px;height:30px;border:var(--border);border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-600);font-size:16px}
.nav-btn:hover{background:var(--gray-50)}
.month-label{font-size:18px;font-weight:600;color:var(--gray-900);flex:1}
.today-btn{padding:6px 14px;border:var(--border);border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:var(--gray-700);font-family:inherit}
.add-btn{padding:6px 16px;background:var(--blue);color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.add-btn:hover{background:var(--blue-dark)}
.cal-container{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:#fff;border-bottom:var(--border);flex-shrink:0}
.dow{text-align:center;padding:8px 4px;font-size:12px;font-weight:500;color:var(--gray-600)}
.dow.sun{color:#d93025}.dow.sat{color:var(--blue)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1}
.cal-cell{border-right:var(--border);border-bottom:var(--border);padding:4px;min-height:100px;cursor:pointer;transition:background .1s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--gray-50)}
.day-num{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:50%;color:var(--gray-600);margin-bottom:2px}
.day-num.today{background:var(--blue);color:#fff;font-weight:600}
.day-num.sun{color:#d93025}.day-num.sat{color:var(--blue)}
.day-num.other{color:var(--gray-200)}
.event-bar{font-size:11px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:3px;line-height:1.6}
.event-bar:hover{opacity:.85}
.cleaning-chip{font-size:10px;padding:1px 5px;border-radius:10px;margin-bottom:2px;display:flex;align-items:center;gap:3px;line-height:1.7;cursor:pointer;border:1px dashed}
.detail-panel{width:300px;border-left:var(--border);background:#fff;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.detail-panel.hidden{display:none}
.detail-header{padding:14px 16px;border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.detail-title{font-size:14px;font-weight:600;color:var(--gray-900)}
.close-btn{width:24px;height:24px;border:none;background:none;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--gray-400)}
.close-btn:hover{background:var(--gray-100)}
.detail-body{padding:14px 16px;flex:1;overflow-y:auto}
.detail-section{margin-bottom:16px}
.detail-section-label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.info-row{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13px}
.info-icon{color:var(--gray-400);flex-shrink:0;margin-top:1px}
.info-label{color:var(--gray-600);min-width:80px;flex-shrink:0}
.info-val{color:var(--gray-900)}
.checklist-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gray-100)}
.checklist-item:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--gray-200);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-box.checked{background:var(--blue);border-color:var(--blue)}
.check-label{font-size:13px;color:var(--gray-800);flex:1}
.check-label.done{text-decoration:line-through;color:var(--gray-400)}
.progress-wrap{margin-bottom:8px}
.progress-bar{height:4px;background:var(--gray-100);border-radius:2px}
.progress-fill{height:4px;border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;color:var(--gray-400);text-align:right;margin-top:2px}
.complete-btn{width:100%;padding:8px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.complete-banner{background:var(--green-light);border-radius:6px;padding:8px 12px;text-align:center;font-size:13px;color:var(--green);font-weight:500;margin-top:8px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:400px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--gray-900)}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--gray-600);margin-bottom:4px;display:block}
.form-group input,.form-group select{width:100%;padding:8px 10px;border:var(--border);border-radius:6px;font-size:13px;font-family:inherit;color:var(--gray-900);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{padding:8px 16px;border:var(--border);border-radius:6px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;color:var(--gray-700)}
.btn-save{padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.empty-detail{padding:40px 20px;text-align:center;color:var(--gray-400)}
.empty-icon{font-size:48px;display:block;margin-bottom:12px;opacity:.3}
.spinner{width:32px;height:32px;border:3px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
@media(max-width:900px){.detail-panel{display:none}.sidebar{width:200px}}
@media(max-width:600px){.sidebar{display:none}.event-bar{font-size:9px;padding:1px 3px}}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="ti ti-home" aria-hidden="true"></i></div>
    <div><div class="logo-text">清掃管理</div><div class="logo-sub">民泊・旅館</div></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">物件</div>
    <div id="property-list"></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">清掃スタッフ</div>
    <div id="staff-list"></div>
  </div>
  <div class="sync-section">
    <div class="sync-title">Googleカレンダー連携</div>
    <div class="sync-status" id="sync-status">
      <i class="ti ti-circle-check" style="font-size:14px;color:#0f9d58" aria-hidden="true"></i>
      <span>接続済み（3物件）</span>
    </div>
    <button class="sync-btn" id="sync-btn" onclick="syncCalendars()">
      <i class="ti ti-refresh" aria-hidden="true"></i><span>今すぐ同期</span>
    </button>
  </div>
</div>
<div class="main">
  <div class="header">
    <button class="nav-btn" onclick="changeMonth(-1)" aria-label="前月"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
    <button class="nav-btn" onclick="changeMonth(1)" aria-label="翌月"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    <div class="month-label" id="month-label"></div>
    <button class="today-btn" onclick="goToday()">今日</button>
    <button class="add-btn" onclick="openAddModal()"><i class="ti ti-plus" aria-hidden="true"></i> 予約追加</button>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div class="cal-container">
      <div class="dow-row">
        <div class="dow sun">日</div><div class="dow">月</div><div class="dow">火</div>
        <div class="dow">水</div><div class="dow">木</div><div class="dow">金</div>
        <div class="dow sat">土</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="detail-panel hidden" id="detail-panel">
      <div class="empty-detail">
        <i class="ti ti-calendar empty-icon" aria-hidden="true"></i>
        <p style="font-size:13px">予定をクリックすると詳細が表示されます</p>
      </div>
    </div>
  </div>
</div>
</div>
<div class="modal-overlay" id="add-modal">
<div class="modal">
  <div class="modal-title"><i class="ti ti-calendar-plus" aria-hidden="true" style="font-size:16px;vertical-align:-2px;margin-right:6px"></i>予約登録</div>
  <div class="form-group"><label class="form-label">物件</label><select id="add-prop"></select></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">チェックイン</label><input type="date" id="add-in"></div>
    <div class="form-group"><label class="form-label">チェックアウト</label><input type="date" id="add-out"></div>
  </div>
  <div class="form-group"><label class="form-label">清掃担当スタッフ</label><select id="add-staff"></select></div>
  <div class="form-group"><label class="form-label">宿泊者名</label><input type="text" id="add-guest" placeholder="山田 太郎"></div>
  <div class="form-group"><label class="form-label">メモ</label><input type="text" id="add-note" placeholder="ペット可、アレルギーなど"></div>
  <div style="font-size:12px;color:var(--gray-400);background:var(--gray-50);border-radius:6px;padding:8px;margin-top:4px">
    <i class="ti ti-info-circle" aria-hidden="true" style="font-size:13px"></i> チェックアウト日に清掃タスクが自動生成されます
  </div>
  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
    <button class="btn-save" onclick="addBooking()">登録する</button>
  </div>
</div>
</div>
<script>
const ICAL_URLS = {
  'nel.shizuoka': 'https://calendar.google.com/calendar/ical/b7c977bab349c38525963f73eb023db41e3df06492384122f85660b2ec030a9d%40group.calendar.google.com/private-3fdd6e18cf76815616b6d26ef78a1383/basic.ics',
  'SAKURA HAUS': 'https://calendar.google.com/calendar/ical/d4176b763462e0fbf40ac8e1d2d714dfbfc210936c73b8a4c9528126585d5ab6%40group.calendar.google.com/private-0f6ee0f56a6609ce4babd78a2c20c7b1/basic.ics',
  'SAKUYA': 'https://calendar.google.com/calendar/ical/ab28b96b37415ef5bd0e475e90c30e56b7a1e47d255cb44859dd212e69e5f4bb%40group.calendar.google.com/private-8ff64fcbce95425a735341748788eadb/basic.ics'
};
const PROP_COLORS = {'nel.shizuoka':'#1a73e8','SAKURA HAUS':'#0f9d58','SAKUYA':'#f4511e'};
const CHECKLIST = ['寝具・タオル交換','浴室・洗面台清掃','トイレ清掃','キッチン清掃','床掃除・モップ','ゴミ捨て','アメニティ補充','冷蔵庫確認','備品チェック','鍵の確認・補充'];
const STAFF_LIST = [
  {id:1,name:'田中 美咲',color:'#1a73e8'},{id:2,name:'鈴木 一郎',color:'#0f9d58'},
  {id:3,name:'佐藤 花子',color:'#f4511e'},{id:4,name:'山本 健太',color:'#8430ce'},
  {id:5,name:'中村あかり',color:'#f09300'},{id:6,name:'高橋 誠',color:'#d93025'},
];
let curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
const today=new Date();
let selectedBookingId=null;
let bookings=JSON.parse(localStorage.getItem('cleaningBookings')||'[]');
let tasks=JSON.parse(localStorage.getItem('cleaningTasks')||'[]');
let propVisible=JSON.parse(localStorage.getItem('propVisible')||'{"nel.shizuoka":true,"SAKURA HAUS":true,"SAKUYA":true}');
function saveData(){
  localStorage.setItem('cleaningBookings',JSON.stringify(bookings));
  localStorage.setItem('cleaningTasks',JSON.stringify(tasks));
  localStorage.setItem('propVisible',JSON.stringify(propVisible));
}
function pad(n){return String(n).padStart(2,'0')}
function dStr(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d)}
function getStaff(id){return STAFF_LIST.find(s=>s.id===id)||{name:'未割当',color:'#9aa0a6'}}
function renderSidebar(){
  document.getElementById('property-list').innerHTML=Object.keys(ICAL_URLS).map(name=>{
    const col=PROP_COLORS[name],vis=propVisible[name];
    return `<div class="property-item" onclick="toggleProp('${name}')">
      <div class="prop-dot" style="background:${col};${!vis?'opacity:.3':''}"></div>
      <div class="prop-name" style="${!vis?'opacity:.4':''}">${name}</div>
      <div class="prop-toggle" style="border-color:${col};background:${vis?col:'transparent'};color:${vis?'#fff':col}">
        ${vis?'<i class="ti ti-check" style="font-size:9px" aria-hidden="true"></i>':''}
      </div></div>`;
  }).join('');
  document.getElementById('staff-list').innerHTML=STAFF_LIST.map(s=>`
    <div class="staff-item">
      <div class="staff-avatar" style="background:${s.color}22;color:${s.color}">${s.name.charAt(0)}</div>
      <div class="staff-name">${s.name}</div>
    </div>`).join('');
}
function toggleProp(name){propVisible[name]=!propVisible[name];saveData();renderSidebar();renderCalendar();}
function renderCalendar(){
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-label').textContent=curYear+'年 '+months[curMonth];
  const first=new Date(curYear,curMonth,1).getDay(),dim=new Date(curYear,curMonth+1,0).getDate();
  const prevDim=new Date(curYear,curMonth,0).getDate();
  const cells=[];
  for(let i=first-1;i>=0;i--)cells.push({d:prevDim-i,other:true,m:curMonth-1<0?11:curMonth-1,yr:curMonth-1<0?curYear-1:curYear});
  for(let d=1;d<=dim;d++)cells.push({d,other:false,m:curMonth,yr:curYear});
  while(cells.length%7!==0){const l=cells[cells.length-1];cells.push({d:l.d+1,other:true,m:curMonth+1>11?0:curMonth+1,yr:curMonth+1>11?curYear+1:curYear});}
  document.getElementById('cal-grid').innerHTML=cells.map((cell,idx)=>{
    const ds=dStr(cell.yr,cell.m,cell.d);
    const isToday=!cell.other&&cell.d===today.getDate()&&curMonth===today.getMonth()&&curYear===today.getFullYear();
    const dow=idx%7;
    const numCls='day-num'+(isToday?' today':cell.other?' other':dow===0?' sun':dow===6?' sat':'');
    const dayB=bookings.filter(b=>propVisible[b.property]&&(b.checkin===ds||b.checkout===ds||(ds>b.checkin&&ds<b.checkout)));
    let evHtml='',count=0;
    dayB.forEach(b=>{
      const col=PROP_COLORS[b.property]||'#888',task=tasks.find(t=>t.bookingId===b.id);
      if(b.checkin===ds&&count<3){
        evHtml+=`<div class="event-bar" style="background:${col}18;color:${col};border-left:2px solid ${col}" onclick="event.stopPropagation();showDetail(${b.id})"><i class="ti ti-arrow-down-circle" style="font-size:9px;flex-shrink:0" aria-hidden="true"></i> IN ${b.property.split(' ')[0]}</div>`;count++;
      }
      if(b.checkout===ds&&count<3){
        evHtml+=`<div class="event-bar" style="background:${col};color:#fff" onclick="event.stopPropagation();showDetail(${b.id})"><i class="ti ti-arrow-up-circle" style="font-size:9px;flex-shrink:0" aria-hidden="true"></i> OUT ${b.property.split(' ')[0]}</div>`;
        if(task){const done=task.checks.filter(c=>c.done).length,pct=Math.round(done/task.checks.length*100),s=getStaff(b.staffId);
          evHtml+=`<div class="cleaning-chip" style="border-color:${col};color:${col};background:${col}10" onclick="event.stopPropagation();showDetail(${b.id})"><i class="ti ti-brush" style="font-size:9px" aria-hidden="true"></i> ${s.name.split(' ')[0]} ${task.done?'✓':pct+'%'}</div>`;}
        count++;
      }
    });
    return `<div class="cal-cell" onclick="clickCell('${ds}')"><div class="${numCls}">${cell.d}</div><div>${evHtml}</div></div>`;
  }).join('');
}
function clickCell(ds){
  const dayB=bookings.filter(b=>propVisible[b.property]&&(b.checkin===ds||b.checkout===ds||(ds>b.checkin&&ds<b.checkout)));
  if(dayB.length>=1)showDetail(dayB[0].id);
}
function showDetail(id){
  selectedBookingId=id;
  const b=bookings.find(x=>x.id===id);if(!b)return;
  const task=tasks.find(t=>t.bookingId===id),col=PROP_COLORS[b.property]||'#888',s=getStaff(b.staffId);
  const panel=document.getElementById('detail-panel');panel.classList.remove('hidden');
  let taskHtml='';
  if(task){
    const done=task.checks.filter(c=>c.done).length,pct=Math.round(done/task.checks.length*100);
    taskHtml=`<div class="detail-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="detail-section-label" style="margin-bottom:0">清掃チェックリスト</div>
        <span class="badge ${task.done?'badge-green':'badge-amber'}">${task.done?'完了':'未完了'}</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div><div class="progress-text">${done}/${task.checks.length}</div></div>
      <div>${task.checks.map((c,i)=>`<div class="checklist-item">
        <div class="check-box${c.done?' checked':''}" style="${c.done?'background:'+col+';border-color:'+col:''}" onclick="toggleCheck(${id},${i})">
          ${c.done?'<i class="ti ti-check" style="font-size:10px;color:#fff" aria-hidden="true"></i>':''}
        </div>
        <span class="check-label${c.done?' done':''}">${c.text}</span>
      </div>`).join('')}</div>
      ${task.done?'<div class="complete-banner"><i class="ti ti-check" aria-hidden="true"></i> 清掃完了済み</div>':`<button class="complete-btn" onclick="markDone(${id})"><i class="ti ti-check" aria-hidden="true"></i> 清掃完了にする</button>`}
    </div>`;
  }
  panel.innerHTML=`<div class="detail-header">
    <div class="detail-title"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${col};margin-right:6px;vertical-align:middle"></span>${b.property}</div>
    <button class="close-btn" onclick="closeDetail()" aria-label="閉じる"><i class="ti ti-x" style="font-size:14px" aria-hidden="true"></i></button>
  </div>
  <div class="detail-body">
    <div class="detail-section">
      <div class="detail-section-label">予約情報</div>
      <div class="info-row"><i class="ti ti-user info-icon" aria-hidden="true" style="font-size:14px"></i><span class="info-label">宿泊者</span><span class="info-val">${b.guest||'（未登録）'}</span></div>
      <div class="info-row"><i class="ti ti-login info-icon" aria-hidden="true" style="font-size:14px"></i><span class="info-label">チェックイン</span><span class="info-val">${b.checkin}</span></div>
      <div class="info-row"><i class="ti ti-logout info-icon" aria-hidden="true" style="font-size:14px"></i><span class="info-label">チェックアウト</span><span class="info-val">${b.checkout}</span></div>
      <div class="info-row"><i class="ti ti-brush info-icon" aria-hidden="true" style="font-size:14px"></i><span class="info-label">清掃担当</span>
        <span class="info-val" style="display:flex;align-items:center;gap:6px">
          <span style="width:18px;height:18px;border-radius:50%;background:${s.color}22;color:${s.color};display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">${s.name.charAt(0)}</span>${s.name}
        </span></div>
      ${b.note?`<div class="info-row"><i class="ti ti-notes info-icon" aria-hidden="true" style="font-size:14px"></i><span class="info-label">メモ</span><span class="info-val" style="font-size:12px">${b.note}</span></div>`:''}
      ${b.source==='gcal'?'<div style="margin-top:8px"><span class="badge badge-blue"><i class="ti ti-brand-google" style="font-size:10px" aria-hidden="true"></i> Googleカレンダーから取得</span></div>':''}
    </div>${taskHtml}</div>`;
}
function toggleCheck(bookingId,idx){
  const task=tasks.find(t=>t.bookingId===bookingId);if(!task)return;
  task.checks[idx].done=!task.checks[idx].done;task.done=task.checks.every(c=>c.done);
  saveData();showDetail(bookingId);renderCalendar();
}
function markDone(bookingId){
  const task=tasks.find(t=>t.bookingId===bookingId);if(!task)return;
  task.done=true;task.checks.forEach(c=>c.done=true);saveData();showDetail(bookingId);renderCalendar();
}
function closeDetail(){document.getElementById('detail-panel').classList.add('hidden');selectedBookingId=null;}
function openAddModal(){
  document.getElementById('add-prop').innerHTML=Object.keys(ICAL_URLS).map(n=>`<option value="${n}">${n}</option>`).join('');
  document.getElementById('add-staff').innerHTML=STAFF_LIST.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  const td=today.toISOString().split('T')[0];
  document.getElementById('add-in').value=td;document.getElementById('add-out').value=td;
  document.getElementById('add-guest').value='';document.getElementById('add-note').value='';
  document.getElementById('add-modal').classList.add('open');
}
function closeModal(){document.getElementById('add-modal').classList.remove('open');}
function addBooking(){
  const property=document.getElementById('add-prop').value,checkin=document.getElementById('add-in').value;
  const checkout=document.getElementById('add-out').value,staffId=parseInt(document.getElementById('add-staff').value);
  const guest=document.getElementById('add-guest').value,note=document.getElementById('add-note').value;
  if(!checkin||!checkout||checkout<=checkin){alert('日付を正しく入力してください');return;}
  const id=Date.now();
  bookings.push({id,property,checkin,checkout,staffId,guest,note,source:'manual'});
  tasks.push({bookingId:id,done:false,checks:CHECKLIST.map(t=>({text:t,done:false}))});
  saveData();closeModal();renderCalendar();showDetail(id);
}
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}renderCalendar();}
function goToday(){curYear=today.getFullYear();curMonth=today.getMonth();renderCalendar();}
async function parseIcal(text,property){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const events=[];let current=null;
  for(let line of lines){
    if(line.startsWith('BEGIN:VEVENT')){current={};}
    else if(line.startsWith('END:VEVENT')&&current){
      if(current.dtstart&&current.dtend&&current.summary){
        const parseDate=s=>{const d=s.replace(/T.*$/,'').replace(/-/g,'');return d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8);};
        const checkin=parseDate(current.dtstart);let checkout=parseDate(current.dtend);
        if(checkout===checkin){const d=new Date(checkout);d.setDate(d.getDate()+1);checkout=dStr(d.getFullYear(),d.getMonth(),d.getDate());}
        const summary=current.summary.replace(/\\,/g,',').replace(/\\n/g,' ').trim();
        if(!summary.toLowerCase().includes('blocked')&&!summary.toLowerCase().includes('unavailable')){events.push({checkin,checkout,guest:summary,property});}
      }
      current=null;
    } else if(current){
      if(line.startsWith('DTSTART'))current.dtstart=line.split(':').slice(1).join(':');
      else if(line.startsWith('DTEND'))current.dtend=line.split(':').slice(1).join(':');
      else if(line.startsWith('SUMMARY'))current.summary=line.split(':').slice(1).join(':');
    }
  }
  return events;
}
async function fetchIcal(property,url){
  const PROXIES=['https://corsproxy.io/?','https://api.allorigins.win/get?url='];
  for(const proxy of PROXIES){
    try{
      const res=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(8000)});
      if(!res.ok)continue;
      let text;
      if(proxy.includes('allorigins')){const json=await res.json();text=json.contents;}
      else{text=await res.text();}
      if(text&&text.includes('BEGIN:VCALENDAR'))return await parseIcal(text,property);
    }catch(e){continue;}
  }
  return[];
}
async function syncCalendars(silent=false){
  const btn=document.getElementById('sync-btn'),statusEl=document.getElementById('sync-status');
  btn.disabled=true;
  if(!silent)statusEl.innerHTML='<i class="ti ti-refresh" style="font-size:14px;color:#1a73e8;animation:spin .8s linear infinite" aria-hidden="true"></i><span> 同期中...</span>';
  let newCount=0,updatedCount=0;
  const defaultStaff={'nel.shizuoka':1,'SAKURA HAUS':2,'SAKUYA':3};
  const results=await Promise.all(Object.entries(ICAL_URLS).map(([property,url])=>fetchIcal(property,url)));
  Object.keys(ICAL_URLS).forEach((property,i)=>{
    const events=results[i];
    events.forEach(ev=>{
      const existing=bookings.find(b=>b.property===property&&b.checkin===ev.checkin&&b.checkout===ev.checkout&&b.source==='gcal');
      if(!existing){const id=Date.now()+Math.random();bookings.push({id,property,checkin:ev.checkin,checkout:ev.checkout,staffId:defaultStaff[property]||1,guest:ev.guest,note:'',source:'gcal'});tasks.push({bookingId:id,done:false,checks:CHECKLIST.map(t=>({text:t,done:false}))});newCount++;}
    });
    const gcalKeys=new Set(events.map(e=>e.property+'|'+e.checkin+'|'+e.checkout));
    const removed=bookings.filter(b=>b.property===property&&b.source==='gcal'&&!gcalKeys.has(b.property+'|'+b.checkin+'|'+b.checkout));
    removed.forEach(b=>{bookings=bookings.filter(x=>x.id!==b.id);tasks=tasks.filter(t=>t.bookingId!==b.id);updatedCount++;});
  });
  saveData();btn.disabled=false;
  const now=new Date(),timeStr=now.getHours()+':'+pad(now.getMinutes()),changed=newCount+updatedCount;
  statusEl.innerHTML='<i class="ti ti-circle-check" style="font-size:14px;color:#0f9d58" aria-hidden="true"></i><span> 同期完了 '+timeStr+(changed>0?' ('+changed+'件更新)':'')+'</span>';
  localStorage.setItem('lastSync',now.toISOString());
  renderCalendar();if(selectedBookingId)showDetail(selectedBookingId);
}
function initApp(){
  renderSidebar();renderCalendar();
  const lastSync=localStorage.getItem('lastSync'),statusEl=document.getElementById('sync-status');
  if(lastSync){
    const mins=Math.round((Date.now()-new Date(lastSync).getTime())/60000);
    const label=mins<1?'たった今':mins<60?mins+'分前':Math.round(mins/60)+'時間前';
    statusEl.innerHTML='<i class="ti ti-circle-check" style="font-size:14px;color:#0f9d58" aria-hidden="true"></i><span> 前回同期: '+label+'</span>';
    setTimeout(()=>syncCalendars(true),200);
  }else{syncCalendars(false);}
  setInterval(()=>syncCalendars(true),5*60*1000);
}
document.getElementById('add-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
initApp();
</script>
